<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOSTECH | Modern IT Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <style>
        .toast-notification {
            position: fixed;
            bottom: -100px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .toast-notification.show {
            bottom: 20px;
        }
        .toast-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
        }
        .toast-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>

    <section id="contact" class="contact-section section-padding">
        <div class="container contact-grid">
            <div class="contact-info">
                <h2 class="section-title">Keling, birgalikda <br><span class="gradient-text">kelajakni quramiz</span></h2>
                <p>Loyihangiz bormi? Bizga yozing va uni eng yuqori sifatda amalga oshirib beramiz.</p>
                <div class="info-links">
                    <a href="mailto:info@dostech.uz"><i class="fas fa-envelope"></i> info@dostech.uz</a>
                    <a href="tel:+998901234567"><i class="fas fa-phone"></i> +998 (90) 123-45-67</a>
                </div>
            </div>
            <form id="contactForm" class="contact-form glass-effect">
                <div class="form-group">
                    <input type="text" id="name" required placeholder="Ismingiz">
                </div>
                <div class="form-group">
                    <input type="email" id="email" required placeholder="Email manzilingiz">
                </div>
                <div class="form-group">
                    <textarea id="message" rows="5" required placeholder="Loyiha haqida qisqacha..."></textarea>
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary w-100">Xabar Yuborish</button>
            </form>
        </div>
    </section>

    <div id="toast" class="toast-notification"></div>

    <script src="/static/js/script.js"></script>
    
    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const toast = document.getElementById('toast');
            
            submitBtn.disabled = true;
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Yuborilmoqda...';

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            function showToast(text, isSuccess) {
                toast.className = 'toast-notification show ' + (isSuccess ? 'toast-success' : 'toast-error');
                toast.innerHTML = (isSuccess ? '<i class="fas fa-check-circle"></i> ' : '<i class="fas fa-exclamation-circle"></i> ') + text;
                setTimeout(() => { toast.classList.remove('show'); }, 4000);
            }

            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    showToast('✅ Xabaringiz muvaffaqiyatli yuborildi.', true);
                    document.getElementById('contactForm').reset();
                } else {
                    showToast('❌ Xabar yuborilmadi.', false);
                }
            } catch (error) {
                showToast('❌ Xabar yuborilmadi.', false);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
